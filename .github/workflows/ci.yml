name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
    
    - name: Run linting
      run: |
        black --check .
        flake8 .
    
    - name: Run security scan
      run: bandit -r apps/ config/
    
    - name: Run tests
      env:
        SECRET_KEY: test-secret-key
        DEBUG: True
      run: pytest tests/ -v --cov=apps

  docker:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t portfolio-django .
    
    - name: Test Docker image
      run: |
        docker run -d -p 8000:8000 -e SECRET_KEY=test -e DEBUG=True portfolio-django
        sleep 10
